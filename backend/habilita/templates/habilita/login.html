{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'css/public/login.css' %}" />
    <title>Habilita+</title>
  </head>
  <body>
    <main class="auth-page">
      <header class="brand">
        <img src="{% static 'img/logo.png' %}" alt="Logo Habilita+" style="width: 400px; height: 400px;" /> 
        <p>Sua jornada para a CNH começa aqui</p>
      </header>

      <section class="card" aria-labelledby="titulo-login">
        <h2 id="titulo-login">Bem-vindo</h2>

        <p class="subtitle">Entre com a sua conta para continuar</p>

        <form id="loginForm" class="form active">
          <div class="field">
            <label for="email">E-mail</label>

            <input type="email" id="email" placeholder="seu@email.com" required />
          </div>

          <div class="field">
            <label for="senha">Senha</label>

            <input type="password" id="senha" required />
          </div>

          <button type="submit" class="btn-primary">Entrar</button>

          <a href="#" class="forgot-password">Esqueci minha senha</a>
        </form>
      </section>
    </main>
  </body>
</html>
