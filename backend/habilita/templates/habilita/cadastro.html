<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../backend/base/static/css/cadastro.css">
    <title>Habilita+</title>


</head>
<body>

    <main class="auth-page">

        <header class="brand">
            <div class="brand__icon" aria-hidden="true">
                🚗
            </div>

            <h1>Habilita+</h1>

            <p>Sua jornada para a CNH começa aqui</p>
        </header>

        <section class="card" aria-labelledby="titulo-login">

            <h2 id="titulo-login">Bem-vindo</h2>

            <p class="subtitle">
                Entre ou crie sua conta para continuar
            </p>

            <div class="tabs">
                <button
                    class="tab active"
                    type="button"
                    data-tab="login"
                >
                    Entrar
                </button>

                <button
                    class="tab"
                    type="button"
                    data-tab="cadastro"
                >
                    Cadastrar
                </button>
            </div>

            <form id="loginForm" class="form active">

                <div class="field">
                    <label for="email">
                        E-mail
                    </label>

                    <input
                        type="email"
                        id="email"
                        placeholder="seu@email.com"
                        required
                    >
                </div>

                <div class="field">
                    <label for="senha">
                        Senha
                    </label>

                    <input
                        type="password"
                        id="senha"
                        required
                    >
                </div>

                <button type="submit" class="btn-primary">
                    Entrar
                </button>

                <a href="#" class="forgot-password">
                    Esqueci minha senha
                </a>

            </form>

            <form id="cadastroForm" class="form">

                <div class="field">
                    <label for="nome">
                        Nome completo
                    </label>

                    <input
                        type="text"
                        id="nome"
                        required
                    >
                </div>

                <div class="field">
                    <label for="emailCadastro">
                        E-mail
                    </label>

                    <input
                        type="email"
                        id="emailCadastro"
                        required
                    >
                </div>

                <div class="field">
                    <label for="senhaCadastro">
                        Senha
                    </label>

                    <input
                        type="password"
                        id="senhaCadastro"
                        required
                    >
                </div>

                <button type="submit" class="btn-primary">
                    Criar Conta
                </button>

            </form>

        </section>

    </main>

    <script src="../assets/js/cadastro.js"></script>

</body>
</html>
