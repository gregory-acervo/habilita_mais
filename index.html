<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <title>Habilita+</title>
    
</head>
<body>
  <main>

    <!-- HERO Código em IA, revisar-->
    <section class="hero">

      <div class="hero__container">

        <!-- LOGO -->
        <div class="hero__logo">
          <img src="assets/images/logo.png" alt="Logo Habilita+" />
        </div>

        <!-- TITLE -->
        <header class="hero__content">
          <h1>
            Sua jornada para a habilitação de maneira simplificada e digital!
            <span>simplificada e digital</span>
          </h1>
        </header>

        <!-- ACTIONS -->
        <div class="hero__actions">
          <a href="#" class="btn btn--primary">
            Começar Agora
          </a>

          <a href="#" class="btn btn--secondary">
            Já tenho conta
          </a>
        </div>

        <!-- FEATURES -->
        <ul class="hero__features">

          <li>
            <span class="icon">✓</span>
            <span>100% Digital</span>
          </li>

          <li>
            <span class="icon">✓</span>
            <span>Integrado com Detran</span>
          </li>

          <li>
            <span class="icon">✓</span>
            <span>Suporte Completo</span>
          </li>

        </ul>

      </div>

    </section>

    <!-- NEXT SECTION -->
    <section class="about">

      <div class="about__container">

        <h2>
          Tudo que você precisa em um só lugar
        </h2>

        <p>
          Gerencie todo o processo de habilitação de forma simples e eficiente
        </p>

      </div>

    </section>

  </main>

</body>
</html>
